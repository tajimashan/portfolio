<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarif Ahsan | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f4f8;
            background: linear-gradient(-45deg, #e3f2fd, #fff5f8, #f3e5f5, #e0f2f1);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING BACKGROUND SHAPES */
        .shape {
            position: absolute;
            filter: blur(50px);
            z-index: -1;
            border-radius: 50%;
            animation: float 20s infinite;
        }
        .shape-1 { width: 300px; height: 300px; background: rgba(66, 133, 244, 0.2); top: -10%; left: -10%; }
        .shape-2 { width: 250px; height: 250px; background: rgba(233, 30, 99, 0.1); bottom: -5%; right: -5%; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        .glass-card {
            width: 92%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 45px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .profile-img:hover { transform: rotate(8deg) scale(1.1); }

        h1 { font-size: 2.2rem; color: #1a1a1a; margin-bottom: 5px; font-weight: 800; }
        
        .toolkit-badge {
            display: inline-block;
            background: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #4285f4;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            opacity: 0;
            animation: btnSlideIn 0.8s forwards;
        }

        @keyframes btnSlideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* STAGGERED ANIMATION DELAYS */
        .btn:nth-child(4) { animation-delay: 0.3s; transform: translateY(20px); }
        .btn:nth-child(5) { animation-delay: 0.4s; transform: translateY(20px); }
        .btn:nth-child(6) { animation-delay: 0.5s; transform: translateY(20px); }
        .btn:nth-child(7) { animation-delay: 0.6s; transform: translateY(20px); }
        .btn:nth-child(8) { animation-delay: 0.7s; transform: translateY(20px); }

        .btn-primary { background: #1a1a1a; color: white; }
        .btn-primary:hover { background: #4285f4; transform: scale(1.03) translateY(-3px); }

        .btn-glass { 
            background: rgba(255, 255, 255, 0.7); 
            color: #1a1a1a; 
            border: 1px solid white; 
        }
        .btn-glass:hover { background: white; transform: scale(1.03) translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .btn-whatsapp { 
            background: #25D366; 
            color: white; 
            position: relative;
            overflow: hidden;
        }

        /* SHIMMER EFFECT */
        .btn-whatsapp::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        .footer-text { margin-top: 30px; font-size: 0.7rem; color: #9aa0a6; font-weight: 700; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="glass-card">
        <img src="logo.jpg" class="profile-img" alt="JA" onerror="this.src='https://ui-avatars.com/api/?name=JA&background=4285f4&color=fff'">
        
        <h1>Jarif Ahsan</h1>
        
        <div class="toolkit-badge">⚡ Mastering C++ & C</div>

        <a href="#" class="btn btn-primary">📖 My Learning Path</a>
        <a href="#" class="btn btn-glass">🛠️ My Tech Stack</a>
        <a href="https://instagram.com/yourusername" class="btn btn-glass">✨ The Visuals</a>
        
        <a href="https://wa.me/8801779954541" class="btn btn-whatsapp">💬 Message on WhatsApp</a>
        <a href="tel:+8801779954541" class="btn btn-glass" style="font-size: 0.85rem;">📞 Call Directly</a>

        <p class="footer-text">© 2026 JARIF AHSAN</p>
    </div>

</body>
</html>
