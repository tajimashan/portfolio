<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarif Ahsan | Lifestyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #fcfcfc;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-dim: #636e72;
            --accent: #00cec9; /* Subtle teal for a clean look */
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* Profile Section */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }
        .profile-img:hover { transform: scale(1.05); }

        h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 8px; }
        
        .bio {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        /* Options/Links */
        .links-container { display: flex; flex-direction: column; gap: 15px; }

        .link-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 400;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.02);
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: #fff;
        }

        /* Staggered Animation for Links */
        .link-card:nth-child(1) { animation-delay: 0.2s; }
        .link-card:nth-child(2) { animation-delay: 0.4s; }
        .link-child(3) { animation-delay: 0.6s; }

        /* Footer / Socials */
        footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
            animation: fadeIn 2s ease;
        }

        footer a {
            color: var(--text-dim);
            font-size: 1.5rem;
            transition: var(--transition);
        }

        footer a:hover {
            color: var(--text-main);
            transform: translateY(-3px);
        }

        /* Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="Jarif Ahsan" class="profile-img">

        <h1>Jarif Ahsan</h1>
        <p class="bio">Curating a life of intent and aesthetics. <br> Exploring the intersection of slow living and tech.</p>

        <div class="links-container">
            <a href="#" class="link-card">✨ The Lifestyle Edit</a>
            <a href="#" class="link-card">☕ My Daily Routine</a>
            <a href="#" class="link-card">📖 Current Reads</a>
            <a href="mailto:your-email@example.com" class="link-card">📩 Let's Collaborate</a>
        </div>

        <footer>
            <a href="https://www.facebook.com/introvertjarifahsan/" target="_blank" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://www.youtube.com/@steam_Gamerz" target="_blank" title="YouTube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://wa.me/8801779954541" target="_blank" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
        </footer>
    </div>

</body>
</html>
