<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarif Ahsan | Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #e2c08d; /* Champagne Gold */
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #050505;
            /* Static Multi-Layer Gradient */
            background-image: 
                radial-gradient(at 10% 10%, #1a1a2e 0px, transparent 50%),
                radial-gradient(at 90% 10%, #2e1a1a 0px, transparent 50%),
                radial-gradient(at 50% 90%, #0f2a2a 0px, transparent 50%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 60px 40px;
            width: 90%; max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* THE NEW NAME STYLE */
        .name-container {
            perspective: 1000px;
            margin-bottom: 5px;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
            /* Metallic Shimmer Effect */
            background: linear-gradient(
                to right, 
                #bf953f, 
                #fcf6ba, 
                #b38728, 
                #fbf5b7, 
                #aa771c
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: entranceSpacing 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                       shimmer 5s linear infinite;
            background-size: 200% auto;
        }

        @keyframes entranceSpacing {
            from { letter-spacing: -10px; opacity: 0; filter: blur(10px); }
            to { letter-spacing: 2px; opacity: 1; filter: blur(0); }
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .profile-img {
            width: 140px; height: 140px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
            transition: 0.5s;
            filter: grayscale(20%);
        }

        .profile-img:hover {
            transform: scale(1.05);
            filter: grayscale(0%);
            border-color: var(--accent);
        }

        .bio {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: var(--accent);
            opacity: 0.8;
        }

        /* RE-DESIGNED OPTION BOXES */
        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 30px;
            display: flex; align-items: center; justify-content: space-between;
            color: #fff; text-decoration: none;
            font-weight: 300; font-size: 0.95rem;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(226, 192, 141, 0.15);
        }

        .btn span { letter-spacing: 1px; }

        /* MUSIC OVERLAY ENHANCEMENTS */
        .playlist-option {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            padding: 22px; margin: 15px 0; border-radius: 25px;
            color: #fff; text-decoration: none; font-weight: 600;
            overflow: hidden; background: #000; border: 1px solid #222;
            transition: 0.4s;
        }

        .playlist-option:hover {
            transform: scale(1.02);
            border-color: #fff;
        }

        .pl-bn:hover { background: #800000; box-shadow: 0 0 30px rgba(128,0,0,0.5); }
        .pl-hi:hover { background: #8b6b10; box-shadow: 0 0 30px rgba(139,107,16,0.5); }
        .pl-en:hover { background: #155e2d; box-shadow: 0 0 30px rgba(21,94,45,0.5); }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 45px; border-radius: 50px;
            width: 85%; max-width: 400px;
            position: relative;
        }

        footer { margin-top: 40px; display: flex; justify-content: center; gap: 35px; }
        footer a { color: rgba(255,255,255,0.3); font-size: 1.8rem; transition: 0.4s; }
        footer a:hover { color: var(--accent); transform: translateY(-5px); }

    </style>
</head>
<body>

<div class="main-card">
    <img src="profile.jpg" alt="Jarif Ahsan" class="profile-img">
    
    <div class="name-container">
        <h1>Jarif Ahsan</h1>
    </div>
    
    <p class="bio">Lifestyle &bull; Tech &bull; Gaming</p>

    <div class="links-container">
        <div class="btn" onclick="openModal('gallery')">
            <span>AESTHETIC GALLERY</span><i class="fa-thin fa-camera-retro"></i>
        </div>
        <div class="btn" onclick="openModal('gaming')">
            <span>THE GAMING DEN</span><i class="fa-thin fa-microchip"></i>
        </div>
        <div class="btn" onclick="openModal('music')">
            <span>ON REPEAT</span><i class="fa-thin fa-waveform-lines"></i>
        </div>
    </div>

    <footer>
        <a href="https://www.facebook.com/introvertjarifahsan/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.youtube.com/@steam_Gamerz" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://wa.me/8801779954541" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </footer>
</div>

<div id="gaming" class="modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content">
        <span style="position: absolute; top: 20px; right: 30px; cursor: pointer; font-size: 2rem; color: #555;" onclick="closeModal('gaming')">×</span>
        <h2 style="font-family: 'Bodoni Moda'; font-size: 2rem; color: var(--accent);">Device Specs</h2>
        <p style="color: #888; letter-spacing: 1px; margin-bottom: 20px;">iQOO Z9 Turbo</p>
        <div style="font-size: 0.9rem; border-top: 1px solid #222; padding-top: 15px;">
            <p style="margin: 10px 0;">Snapdragon 8s Gen 3</p>
            <p style="margin: 10px 0;">144Hz AMOLED Display</p>
            <p style="margin: 10px 0;">6000mAh Battery</p>
            <p style="margin: 10px 0;">AnTuTu Score: 1.76M</p>
        </div>
    </div>
</div>

<div id="music" class="modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-content">
        <span style="position: absolute; top: 20px; right: 30px; cursor: pointer; font-size: 2rem; color: #555;" onclick="closeModal('music')">×</span>
        <h2 style="font-family: 'Bodoni Moda'; font-size: 2rem; color: var(--accent); text-align: center;">Curated Playlists</h2>
        <a href="https://open.spotify.com/playlist/3QlXL3RD2FO5LMOuqGLkld?si=X0yX3oKtTp-GMzIO562Y4A&pi=BwkuXimKRT-Nl" target="_blank" class="playlist-option pl-bn">BANGLA</a>
        <a href="https://open.spotify.com/playlist/6w0o2S6MMkC9e0eW9UV85H?si=CKvYGy3aSpWTandFhuFcFQ&pi=jWWaSdkjS0erK" target="_blank" class="playlist-option pl-hi">HINDI</a>
        <a href="https://open.spotify.com/playlist/6terxf5tS80BjAVSMgTisj?si=tnlNOtGfTbe_ZpIzhKuqaQ&pi=YLZxI0L9TBmzC" target="_blank" class="playlist-option pl-en">ENGLISH</a>
    </div>
</div>

<script>
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onclick = function(e) { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; }
</script>

</body>
</html>
