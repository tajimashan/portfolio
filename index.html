<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarif Ahsan | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #05070a;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* The Main Hub Card */
        .hub-card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .profile-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 30px; /* Modern "Squircle" look */
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 3px;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            border-radius: 27px;
            object-fit: cover;
            background: #05070a;
        }

        h1 { font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 8px; }
        
        .tagline {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Modern Toolkit Badge */
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        /* Sleek Buttons */
        .modern-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #05070a;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .modern-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            background: #00d2ff;
            color: #fff;
        }

        .secondary-link {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .secondary-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hub-card">
        <div class="profile-container">
            <div class="profile-img">
                <img src="logo.jpg" alt="JA" onerror="this.src='https://ui-avatars.com/api/?name=JA&background=05070a&color=00d2ff'">
            </div>
        </div>

        <h1>Jarif Ahsan</h1>
        <p class="tagline">Crafting logic with C++ and building modern web experiences.</p>

        <div class="badge-container">
            <span class="badge">C++</span>
            <span class="badge">C</span>
            <span class="badge">HTML</span>
        </div>

        <a href="#" class="modern-link">Explore My Projects</a>
        <a href="https://instagram.com/yourusername" class="modern-link secondary-link">Instagram</a>
        <a href="#" class="modern-link secondary-link">Current Workspace</a>

        <p style="margin-top: 25px; font-size: 0.7rem; color: #444;">&copy; 2026 JARIF AHSAN</p>
    </div>

</body>
</html>
