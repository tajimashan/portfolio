<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarif Ahsan | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Vibrant Light Background */
            background: linear-gradient(-45deg, #e3f2fd, #fce4ec, #f3e5f5, #e8f5e9);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* LIGHT GLASS CARD */
        .glass-card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            /* Entrance Animation */
            animation: cardAppear 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .profile-container {
            position: relative;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 { 
            font-size: 2.2rem; 
            color: #1a1a1a; 
            margin-bottom: 10px; 
            letter-spacing: -1.5px; 
            font-weight: 800;
        }
        
        .tagline {
            font-size: 1rem;
            color: #5f6368;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* Animated Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* Primary Light Button */
        .btn-primary {
            background: #1a1a1a;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            background: #4285f4;
            box-shadow: 0 15px 30px rgba(66, 133, 244, 0.3);
        }

        /* Glassy Secondary Button */
        .btn-glass {
            background: rgba(255, 255, 255, 0.6);
            color: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .btn-glass:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 1);
            border-color: #1a1a1a;
        }

        .toolkit-badge {
            display: inline-block;
            background: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #4285f4;
            margin-bottom: 35px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile-container">
            <img src="logo.jpg" class="profile-img" alt="JA" onerror="this.src='https://ui-avatars.com/api/?name=JA&background=4285f4&color=fff'">
        </div>
        
        <h1>Jarif Ahsan</h1>
        
        <div class="toolkit-badge">
            ⚡ Mastering C++ & Web Tech
        </div>

        <p class="tagline">Creating digital experiences with clean code and modern design.</p>

        <a href="#" class="btn btn-primary">🚀 Explore Projects</a>
        <a href="https://instagram.com/yourusername" class="btn btn-glass">Instagram</a>
        <a href="#" class="btn btn-glass">GitHub Profile</a>

        <p style="margin-top: 30px; font-size: 0.75rem; color: #9aa0a6; font-weight: 600; letter-spacing: 1px;">
            EST. 2026
        </p>
    </div>

</body>
</html>
