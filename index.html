<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarif Ahsan | Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #050505;
            color: #00FF41; /* Classic Terminal Green */
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* CRT Screen Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-window {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border: 1px solid #00FF41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            position: relative;
            background: rgba(0, 20, 0, 0.9);
        }

        .header {
            border-bottom: 1px solid #00FF41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .glitch {
            font-size: 2rem;
            position: relative;
            text-transform: uppercase;
        }

        .main-content {
            line-height: 1.6;
        }

        .command { color: #fff; }

        .links-container {
            margin-top: 30px;
        }

        .terminal-link {
            display: block;
            color: #00FF41;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border: 1px dashed #00FF41;
            transition: all 0.3s;
        }

        .terminal-link:hover {
            background: #00FF41;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 10px #00FF41;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        @media (max-width: 480px) {
            .glitch { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="header">
        <span>JARIF_OS_v1.0</span>
        <span>[STATUS: ONLINE]</span>
    </div>

    <div class="main-content">
        <div class="glitch">JARIF AHSAN</div>
        <p><span class="command">C:\Users\Jarif></span> run learning_path.exe</p>
        <p style="color: #888;">> C++ Logic Modules ... LOADED</p>
        <p style="color: #888;">> HTML/CSS Structures ... LOADED</p>
        
        <div class="links-container">
            <a href="YOUR_LINK_1" class="terminal-link">[01] VIEW_PROJECTS</a>
            <a href="YOUR_LINK_2" class="terminal-link">[02] KNOWLEDGE_BASE</a>
            <a href="https://instagram.com/your_username" class="terminal-link">[03] INSTAGRAM_FEED</a>
            <a href="mailto:your@email.com" class="terminal-link">[04] SEND_SIGNAL (Email)</a>
        </div>

        <p><span class="command">C:\Users\Jarif></span> <span class="blink">_</span></p>
    </div>
</div>

</body>
</html>
